<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#03040a" />
  <title>Sign in — Genesis Vault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #03040a;
      --surface:  #0b0d17;
      --surface2: #0f1120;
      --border:   #1a1d2e;
      --accent:   #5b6ef5;
      --accent2:  #a78bfa;
      --glow:     rgba(91, 110, 245, 0.18);
      --text:     #e8eaf6;
      --muted:    #5a5f7a;
      --error:    #f87171;
      --mono:     'Space Mono', monospace;
      --sans:     'Space Grotesk', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,110,245,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,110,245,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse at 50% 0%, rgba(91,110,245,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-logo span { color: var(--muted); font-weight: 400; }

    .nav-back {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── Card ── */
    .card-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      animation: fadeUp 0.4s ease both;
    }

    /* ── Card header ── */
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.75rem 0;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-family: var(--sans);
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder { color: var(--muted); opacity: 0.7; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,110,245,0.12);
    }

    input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(248,113,113,0.1);
    }

    /* Password wrapper */
    .input-wrap {
      position: relative;
    }

    .input-wrap input { padding-right: 2.5rem; }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Error message */
    .field-error {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 0.35rem;
      display: none;
    }
    .field-error.visible { display: block; }

    /* Forgot */
    .forgot {
      display: block;
      text-align: right;
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      margin-top: 0.4rem;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--accent); }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      opacity: 0.88;
      box-shadow: 0 0 20px var(--glow);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-submit .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .btn-submit.loading .btn-text { opacity: 0; }
    .btn-submit.loading .spinner { display: block; }

    /* ── Alert ── */
    .alert {
      display: none;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: var(--error);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .alert.visible { display: block; }

    /* ── Footer note ── */
    .card-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 1.75rem;
      gap: 3px;
    }

    .mode-btn {
      flex: 1;
      padding: 0.45rem;
      border: none;
      border-radius: 6px;
      background: none;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* Hide register fields by default */
    .register-only { display: none; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    @media (max-width: 440px) {
      .card { padding: 2rem 1.25rem; border-radius: 12px; }
      nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">GENESIS<span> / </span>VAULT</a>
    <a href="index.html" class="nav-back">← Back</a>
  </nav>

  <!-- Card -->
  <div class="card-wrap">
    <div class="card">

      <div class="card-header">
        <div class="card-icon">◈</div>
        <div class="card-title">Genesis Vault</div>
        <div class="card-subtitle">Sign in to access your Nexus</div>
      </div>

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-login" onclick="setMode('login')">Sign in</button>
        <button class="mode-btn" id="btn-register" onclick="setMode('register')">Create account</button>
      </div>

      <!-- Error alert -->
      <div class="alert" id="alert"></div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <span class="field-error" id="email-error">Enter a valid email address.</span>
      </div>

      <!-- Name (register only) -->
      <div class="field register-only" id="field-name">
        <label for="name">Display name</label>
        <input type="text" id="name" placeholder="Your name" autocomplete="name" />
        <span class="field-error" id="name-error">Name is required.</span>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pw" onclick="togglePw()" aria-label="Show password" id="pw-toggle">👁</button>
        </div>
        <span class="field-error" id="pw-error">Password must be at least 8 characters.</span>
        <a href="#" class="forgot" id="forgot-link">Forgot password?</a>
      </div>

      <!-- Confirm password (register only) -->
      <div class="field register-only" id="field-confirm">
        <label for="confirm">Confirm password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <span class="field-error" id="confirm-error">Passwords do not match.</span>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">
        <span class="btn-text" id="submit-text">Sign in</span>
        <div class="spinner"></div>
      </button>

      <div class="card-footer" id="card-footer">
        No account? <a href="#" onclick="setMode('register'); return false;">Create one</a>
      </div>

    </div>
  </div>

</div>

<script>
  let mode = 'login';

  function setMode(m) {
    mode = m;
    const isLogin = m === 'login';

    document.getElementById('btn-login').classList.toggle('active', isLogin);
    document.getElementById('btn-register').classList.toggle('active', !isLogin);

    document.querySelectorAll('.register-only').forEach(el => {
      el.style.display = isLogin ? 'none' : 'block';
    });

    document.getElementById('submit-text').textContent = isLogin ? 'Sign in' : 'Create account';
    document.getElementById('forgot-link').style.display = isLogin ? 'block' : 'none';
    document.getElementById('card-footer').innerHTML = isLogin
      ? 'No account? <a href="#" onclick="setMode(\'register\'); return false;">Create one</a>'
      : 'Already have an account? <a href="#" onclick="setMode(\'login\'); return false;">Sign in</a>';

    clearErrors();
  }

  function clearErrors() {
    document.querySelectorAll('.field-error').forEach(e => e.classList.remove('visible'));
    document.querySelectorAll('input').forEach(e => e.classList.remove('error'));
    document.getElementById('alert').classList.remove('visible');
  }

  function showError(fieldId, msgId) {
    document.getElementById(fieldId).classList.add('error');
    document.getElementById(msgId).classList.add('visible');
  }

  function togglePw() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  function handleSubmit() {
    clearErrors();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('email', 'email-error');
      valid = false;
    }

    if (password.length < 8) {
      showError('password', 'pw-error');
      valid = false;
    }

    if (mode === 'register') {
      const name = document.getElementById('name').value.trim();
      const confirm = document.getElementById('confirm').value;

      if (!name) {
        showError('name', 'name-error');
        valid = false;
      }

      if (confirm !== password) {
        showError('confirm', 'confirm-error');
        valid = false;
      }
    }

    if (!valid) return;

    // Simulate loading → redirect to nexus
    const btn = document.getElementById('submit-btn');
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      window.location.href = 'nexus.html';
    }, 1200);
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
